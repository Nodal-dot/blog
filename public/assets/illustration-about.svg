<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-labelledby="illustTitle">
  <title id="illustTitle">Abstract technology illustration</title>
  <defs>
    <linearGradient id="gradA" x1="0" x2="1">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="gradB" x1="0" x2="1">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="f1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="28" result="b" />
      <feBlend in="SourceGraphic" in2="b" mode="normal"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="none" />

  <!-- soft blobs -->
  <g filter="url(#f1)">
    <ellipse cx="220" cy="180" rx="180" ry="130" fill="url(#gradA)" opacity="0.22" />
    <ellipse cx="520" cy="120" rx="140" ry="100" fill="url(#gradB)" opacity="0.18" />
    <ellipse cx="660" cy="320" rx="200" ry="160" fill="#f0f9ff" opacity="0.6" />
  </g>

  <!-- layered abstract shapes -->
  <g transform="translate(60,90)">
    <path d="M60 260 C140 40 420 20 540 160 C660 300 420 360 260 300 C120 240 60 260 60 260 Z"
          fill="#fff" opacity="0.06" />

    <path d="M120 200 C220 60 420 40 520 160 C600 260 420 320 300 260 C180 200 120 200 120 200 Z"
          fill="url(#gradA)" opacity="0.14" />

    <g id="device" transform="translate(160,180)">
      <rect x="0" y="20" rx="18" ry="18" width="420" height="220" fill="#fff" opacity="0.95" />
      <rect x="14" y="36" width="392" height="140" rx="10" fill="#f8fafc" />
      <rect x="32" y="52" width="120" height="12" rx="4" fill="#e6eefc" />
      <rect x="32" y="80" width="320" height="10" rx="4" fill="#f1f5f9" />
      <rect x="32" y="100" width="260" height="10" rx="4" fill="#f1f5f9" />

      <!-- subtle decorative lines -->
      <path d="M16 174 L404 174" stroke="#e6eefc" stroke-width="2" stroke-linecap="round" opacity="0.9" />
    </g>
  </g>

  <!-- accent strokes -->
  <g stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.95">
    <path d="M120 120 C160 80 300 60 360 120" stroke="url(#gradA)" opacity="0.5"/>
    <path d="M480 40 C540 80 640 100 700 120" stroke="url(#gradB)" opacity="0.4"/>
  </g>

</svg>